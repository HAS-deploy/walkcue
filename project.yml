name: WalkCue
options:
  bundleIdPrefix: com.walkcue
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "NH2XFPC9KN"
    CODE_SIGN_STYLE: Automatic

targets:
  WalkCue:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WalkCue
        excludes:
          - "**/.DS_Store"
    resources:
      - WalkCue/Resources/Assets.xcassets
      - WalkCue/Resources/PrivacyInfo.xcprivacy
      - WalkCue/Resources/Configuration.storekit
    info:
      path: WalkCue/Resources/Info.plist
      properties:
        CFBundleDisplayName: WalkCue
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "3"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.walkcue.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        CURRENT_PROJECT_VERSION: "3"
        MARKETING_VERSION: "1.0"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  WalkCueTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WalkCueTests
    dependencies:
      - target: WalkCue
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.walkcue.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  WalkCue:
    build:
      targets:
        WalkCue: all
        WalkCueTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WalkCueTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
